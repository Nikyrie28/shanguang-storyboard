<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪光分镜</title>
  <link rel="icon" href="./logo-frame-2.png" type="image/png">
  <link rel="shortcut icon" href="./logo-frame-2.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: '#ece8e1',
            text: '#2d2f33',
            muted: '#8b8f97',
            'muted-soft': '#9ea3aa',
            'surface-soft': '#faf9f7',
            primary: '#f3cf69',
            button: '#f6d56f',
            'button-hover': '#efcc61',
            'button-text': '#7f6028',
            success: '#2bb673',
            danger: '#e5484d',
            'brand-violet': '#8f88d8'
          },
          boxShadow: {
            auth: '0 20px 60px rgba(28,31,36,0.08)',
            menu: '0 14px 32px rgba(28,31,36,.08)',
            modal: '0 18px 48px rgba(32,35,40,.1)'
          },
          fontFamily: {
            sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"PingFang SC"', '"Hiragino Sans GB"', '"Microsoft YaHei"', '"Noto Sans CJK SC"', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    *{box-sizing:border-box}
    .heroicon{display:block;width:1em;height:1em;flex:none;overflow:visible}
    .auth-tab.active{background:#fff;color:#2d2f33;box-shadow:0 2px 8px rgba(28,31,36,.06)}
    .sidebar-item.active{background:linear-gradient(180deg,#f7f4ff 0%,#eef1ff 100%);color:#8f88d8;box-shadow:inset 0 0 0 1px #ece9fb}
    .action-menu{display:none}
    .action-menu.open{display:block}
    .project-folder{position:relative}
    .project-folder::before{content:"";position:absolute;top:-7px;left:14px;width:32px;height:14px;border-radius:10px 10px 0 0;background:linear-gradient(180deg,#edb934 0%,#f3ca61 100%)}
    .project-folder::after{content:"";position:absolute;left:9px;right:9px;top:18px;bottom:12px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,250,233,.88))}
    .project-folder-cover{position:absolute;left:11px;right:11px;top:22px;bottom:16px;z-index:1;border-radius:7px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,249,237,.85))}
    .project-card.create-card .project-folder{align-items:center;background:#f7f7f6;box-shadow:inset 0 0 0 1px #ece8e1}
    .project-card.create-card .project-folder::before{background:#f0efec}
    .project-card.create-card .project-folder::after{display:none}
    .project-card:hover .project-actions{opacity:1;transform:translateY(0)}
    .sortable-ghost{opacity:.4!important;background:#fff9e6!important}
    .time-cell:hover .row-delete-btn{opacity:1;pointer-events:auto}
    .image-box{overflow:visible}
    .image-box .img-delete-btn{opacity:0;pointer-events:none;position:absolute;top:0;right:0;transform:translate(50%,-50%);z-index:50;transition:opacity .15s ease,transform .15s ease}
    .image-box:hover .img-delete-btn,
    .image-box.has-image:hover .img-delete-btn{opacity:1;pointer-events:auto}
    .col-index{overflow:visible}
    .row-insert-anchor{z-index:30;pointer-events:auto}
    .row-insert-btn{opacity:.2;pointer-events:none;transition:opacity .15s ease,transform .15s ease}
    .col-index:hover .row-insert-btn,
    .row-insert-anchor:hover .row-insert-btn,
    tr:hover .row-insert-btn,
    .row-insert-btn:hover {opacity:1;pointer-events:auto;transform:scale(1.02)}
    .upload-box.drag-over{border-color:#e4c978;background:#fffaf0}
    .row-select-cell{display:none}
    .batch-mode-active .row-select-cell{display:table-cell}
    [contenteditable="true"]:focus{outline:2px solid rgba(246,213,111,.7);background:#fffdf6;border-radius:8px}
    .time-wheel-item.active{background:#f6d56f;color:#7f6028;transform:scale(1.02)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .pdf-exporting .drag-handle,.pdf-exporting .col-drag,.pdf-exporting .col-index,.pdf-exporting .action-col,.pdf-exporting .row-delete-anchor,.pdf-exporting .row-copy-btn,.pdf-exporting .img-delete-btn,.pdf-exporting .add-row-btn,.pdf-exporting .table-toolbar,.pdf-exporting .plus-sign{display:none!important}
    .sync-indicator[data-status="synced"]{background:#e8f5e9;color:#2bb673}
    .sync-indicator[data-status="syncing"]{background:#fff7da;color:#7f6028}
    .sync-indicator[data-status="offline"]{background:#fff1f2;color:#e5484d}
    .sync-indicator[data-status="syncing"] .sync-dot{animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    /* 表格样式 */
    th { position: relative; }
    th:hover .resize-handle { opacity: 1; }
    .resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 4px; cursor: col-resize; background: transparent; z-index: 10; opacity: 0; transition: opacity 0.2s; }
    .resize-handle:hover { background: #e4c978; opacity: 1; }
  </style>
</head>
<body class="m-0 bg-white font-sans text-text">
  <div id="loading-overlay" class="fixed inset-0 z-[2000] flex items-center justify-center bg-white/90"><div class="loading-spinner h-12 w-12 animate-spin rounded-full border-4 border-border border-t-primary"></div></div>
  <div id="auth-view" class="auth-container hidden flex min-h-screen items-center justify-center bg-[linear-gradient(135deg,#fdfbf7_0%,#faf5e8_100%)] px-5 py-8">
    <div class="auth-card w-full max-w-[400px] rounded-[24px] bg-white px-9 py-10 text-center shadow-auth">

      <h1 class="auth-title mb-2 text-[28px] font-extrabold">闪光分镜</h1>
      <p class="auth-subtitle mb-8 text-sm text-muted">分镜管理，云端同步</p>
      <div class="auth-tabs mb-7 flex gap-1 rounded-xl bg-[#f5f5f3] p-1">
        <button class="auth-tab flex-1 rounded-[10px] bg-transparent px-4 py-2.5 text-sm font-bold text-muted transition-all duration-200 hover:text-text active" data-tab="login">登录</button>
        <button class="auth-tab flex-1 rounded-[10px] bg-transparent px-4 py-2.5 text-sm font-bold text-muted transition-all duration-200 hover:text-text" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form flex flex-col gap-4">
        <input type="email" class="auth-input w-full rounded-xl border border-border bg-white px-4 py-3.5 text-[15px] text-text outline-none transition duration-200 placeholder:text-[#c0b8ac] focus:border-[#e6cb7c] focus:ring-4 focus:ring-[#f6d56f]/15" id="login-email" placeholder="邮箱地址" required>
        <input type="password" class="auth-input w-full rounded-xl border border-border bg-white px-4 py-3.5 text-[15px] text-text outline-none transition duration-200 placeholder:text-[#c0b8ac] focus:border-[#e6cb7c] focus:ring-4 focus:ring-[#f6d56f]/15" id="login-password" placeholder="密码" required>
        <div id="login-error" class="auth-error hidden rounded-[10px] bg-[#fff5f5] px-3 py-3 text-left text-[13px] text-danger"></div>
        <button type="submit" class="auth-btn w-full rounded-xl bg-button px-5 py-3.5 text-[15px] font-bold text-button-text transition duration-200 hover:-translate-y-px hover:bg-button-hover disabled:cursor-not-allowed disabled:opacity-70 disabled:hover:translate-y-0" id="login-btn">登录</button>
      </form>
      <form id="register-form" class="auth-form hidden flex flex-col gap-4">
        <input type="email" class="auth-input w-full rounded-xl border border-border bg-white px-4 py-3.5 text-[15px] text-text outline-none transition duration-200 placeholder:text-[#c0b8ac] focus:border-[#e6cb7c] focus:ring-4 focus:ring-[#f6d56f]/15" id="register-email" placeholder="邮箱地址" required>
        <input type="password" class="auth-input w-full rounded-xl border border-border bg-white px-4 py-3.5 text-[15px] text-text outline-none transition duration-200 placeholder:text-[#c0b8ac] focus:border-[#e6cb7c] focus:ring-4 focus:ring-[#f6d56f]/15" id="register-password" placeholder="密码（至少6位）" required minlength="6">
        <input type="text" class="auth-input w-full rounded-xl border border-border bg-white px-4 py-3.5 text-[15px] text-text outline-none transition duration-200 placeholder:text-[#c0b8ac] focus:border-[#e6cb7c] focus:ring-4 focus:ring-[#f6d56f]/15" id="register-username" placeholder="昵称（选填）">
        <div id="register-error" class="auth-error hidden rounded-[10px] bg-[#fff5f5] px-3 py-3 text-left text-[13px] text-danger"></div>
        <button type="submit" class="auth-btn w-full rounded-xl bg-button px-5 py-3.5 text-[15px] font-bold text-button-text transition duration-200 hover:-translate-y-px hover:bg-button-hover disabled:cursor-not-allowed disabled:opacity-70 disabled:hover:translate-y-0" id="register-btn">注册</button>
      </form>
      <p class="auth-hint mt-5 text-[13px] text-muted" id="auth-hint"></p>
    </div>
  </div>
  <div id="app-view" class="app-shell hidden w-full px-4 pb-6 pt-3 max-md:px-0">
    <div class="user-bar mb-2 flex items-center justify-between gap-4 px-4 py-2 max-md:flex-wrap max-md:items-start max-md:px-[14px] max-md:pb-2 max-md:pt-3">
      <div class="user-bar-brand flex min-w-0 items-center max-md:basis-full">
        <img class="user-bar-brand-logo block h-[52px] w-auto max-w-[min(188px,42vw)] max-md:h-[45px] max-md:max-w-[156px]" src="./logo-frame-2.png" alt="闪光 Logo">
      </div>
      <div class="user-bar-actions ml-auto flex min-w-0 flex-wrap items-center justify-end gap-3 max-md:w-full max-md:gap-2">
        <span class="sync-indicator inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-semibold" data-status="synced" id="sync-indicator"><span class="sync-dot h-2 w-2 rounded-full bg-current"></span><span class="sync-text">已同步</span></span>
        <span class="user-email min-w-0 max-w-[240px] truncate whitespace-nowrap text-[13px] text-muted max-md:max-w-none max-md:flex-[1_1_160px]" id="user-email"></span>
        <button class="btn-logout rounded-[10px] border border-border bg-white px-4 py-2 text-[13px] font-bold text-muted transition duration-200 hover:bg-[#f8f8f6] hover:text-text" id="logout-btn">退出登录</button>
      </div>
    </div>
    <section id="home-view">
      <div class="home-shell mx-auto grid min-h-[calc(100vh-24px)] w-[min(100%,1760px)] grid-cols-[74px_minmax(0,1fr)] overflow-hidden rounded-[22px] border border-border bg-white max-md:grid-cols-1 max-md:border-0 max-md:rounded-none">
        <aside class="home-sidebar flex flex-col items-center gap-4 border-r border-border bg-[linear-gradient(180deg,#fcfcfb_0%,#f8f8f6_100%)] px-[10px] py-[18px] max-md:flex-row max-md:border-b max-md:border-r-0 max-md:px-3 max-md:py-[10px]">
          <div class="sidebar-logo grid h-[42px] w-[42px] place-items-center rounded-[14px] text-[28px] font-extrabold text-[#f0be3d]">⚡</div>
          <div class="sidebar-divider my-[2px] mb-2 h-px w-[42px] bg-border max-md:mb-[2px] max-md:h-[42px] max-md:w-px"></div>
          <div class="sidebar-item active flex w-[54px] flex-col items-center gap-1.5 rounded-2xl px-1.5 py-2.5 text-center text-[11px] font-bold text-[#b0b5bc]"><div class="sidebar-item-icon text-[22px] leading-none"><svg class="heroicon heroicon-folder" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3.75 6.75h5.1l1.8 1.8h9.6v7.95A2.25 2.25 0 0 1 18 18.75H6A2.25 2.25 0 0 1 3.75 16.5V6.75Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div>项目</div></div>
        </aside>
        <div class="home-main bg-white px-7 pb-12 pt-[26px] max-md:px-[14px] max-md:pb-7 max-md:pt-[18px]">
          <div class="home-header mb-[18px] flex items-start justify-between gap-4"><h1 class="home-title m-0 text-[18px] font-extrabold text-text">我的项目</h1></div>
          <div class="home-sortbar mb-6 flex items-center gap-[14px] text-[13px] font-bold text-muted"><span>排序</span><span class="active text-text">自定义</span></div>
          <div id="project-grid" class="project-grid grid auto-rows-min grid-cols-[repeat(auto-fill,minmax(150px,150px))] items-start gap-y-7 gap-x-11 max-md:grid-cols-2 max-md:gap-x-[18px] max-md:gap-y-[22px]"></div>
          <div id="empty-projects" class="empty-state hidden pt-[22px] text-[13px] text-muted">还没有项目，点击左侧第一个卡片创建新项目。</div>
        </div>
      </div>
    </section>
    <section id="project-view" class="hidden">
      <div class="page-head mb-[14px] flex items-center justify-between gap-7 px-1 pt-1.5 max-md:flex-col max-md:items-start max-md:gap-3">
        <div class="page-head-left flex min-w-[220px] max-w-[320px] flex-col items-start justify-center gap-1 max-md:min-w-0 max-md:max-w-none">
          <div class="page-head-copy flex min-w-0 flex-col justify-center"><h2 id="project-page-title" class="mb-0.5 text-[22px] font-extrabold leading-[1.08] tracking-[-0.01em] max-md:text-[20px]">项目详情</h2><p id="project-page-desc" class="m-0 text-sm font-normal leading-[1.15] text-[#a3a9b2] max-md:text-[13px]">已进入项目</p></div>
        </div>
        <div class="page-actions flex flex-wrap gap-2.5">
          <button class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text" id="back-home-btn"><svg class="heroicon heroicon-arrow-left text-base" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>返回主页</span></button>
          <div class="action-group relative">
            <button class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text" id="import-menu-btn"><span>导入</span><svg class="heroicon heroicon-chevron-down btn-caret text-[18px]" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m19.5 8.25-7.5 7.5-7.5-7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="action-menu absolute right-0 top-[calc(100%+8px)] z-30 min-w-[158px] rounded-[14px] border border-border bg-white p-2 shadow-menu" id="import-menu"><button class="action-menu-item w-full rounded-[10px] px-3 py-2.5 text-left text-[13px] font-bold text-[#5f6670] transition duration-150 hover:bg-[#f8f8f6] hover:text-text" id="import-json-btn">导入 JSON</button></div>
          </div>
          <div class="action-group relative">
            <button class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text" id="export-menu-btn"><span>导出</span><svg class="heroicon heroicon-chevron-down btn-caret text-[18px]" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m19.5 8.25-7.5 7.5-7.5-7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="action-menu absolute right-0 top-[calc(100%+8px)] z-30 min-w-[158px] rounded-[14px] border border-border bg-white p-2 shadow-menu" id="export-menu">
              <button class="action-menu-item w-full rounded-[10px] px-3 py-2.5 text-left text-[13px] font-bold text-[#5f6670] transition duration-150 hover:bg-[#f8f8f6] hover:text-text" id="export-pdf-btn">导出 PDF</button>
              <button class="action-menu-item w-full rounded-[10px] px-3 py-2.5 text-left text-[13px] font-bold text-[#5f6670] transition duration-150 hover:bg-[#f8f8f6] hover:text-text" id="export-json-btn">导出 JSON</button>
              <button class="action-menu-item w-full rounded-[10px] px-3 py-2.5 text-left text-[13px] font-bold text-[#5f6670] transition duration-150 hover:bg-[#f8f8f6] hover:text-text" id="export-html-btn">导出 HTML</button>
            </div>
          </div>
          <button class="btn btn-secondary inline-flex items-center justify-center gap-2 rounded-[14px] bg-button px-[18px] py-[11px] text-sm font-bold text-button-text transition duration-150 hover:-translate-y-px hover:bg-button-hover" id="save-project-btn"><svg class="heroicon heroicon-save text-base" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3.75 6.75h5.1l1.8 1.8h9.6v7.95A2.25 2.25 0 0 1 18 18.75H6A2.25 2.25 0 0 1 3.75 16.5V6.75Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 10.5v5.25m0 0 2.25-2.25M12 15.75l-2.25-2.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>保存</span></button>
        </div>
      </div>
      <div class="project-info-bar mb-[18px] grid grid-cols-5 gap-[14px] rounded-[14px] border border-border bg-white p-[14px] max-[1100px]:grid-cols-2 max-md:grid-cols-1" id="project-info-bar">
        <div class="info-field rounded-xl border border-border bg-surface-soft px-[14px] py-3"><label class="mb-1.5 block text-xs font-bold text-muted">项目名称</label><div class="min-h-6 font-bold outline-none" contenteditable="true" data-info-field="name"></div></div>
        <div class="info-field rounded-xl border border-border bg-surface-soft px-[14px] py-3"><label class="mb-1.5 block text-xs font-bold text-muted">拍摄日期</label><div class="min-h-6 font-bold outline-none" contenteditable="true" data-info-field="date"></div></div>
        <div class="info-field rounded-xl border border-border bg-surface-soft px-[14px] py-3"><label class="mb-1.5 block text-xs font-bold text-muted">导演</label><div class="min-h-6 font-bold outline-none" contenteditable="true" data-info-field="director"></div></div>
        <div class="info-field rounded-xl border border-border bg-surface-soft px-[14px] py-3"><label class="mb-1.5 block text-xs font-bold text-muted">拍摄地点</label><div class="min-h-6 font-bold outline-none" contenteditable="true" data-info-field="location"></div></div>
        <div class="info-field rounded-xl border border-border bg-surface-soft px-[14px] py-3"><label class="mb-1.5 block text-xs font-bold text-muted">总时长</label><div class="min-h-6 font-bold outline-none" contenteditable="true" data-info-field="duration"></div></div>
      </div>
      <div class="project-toolbar mb-4 flex flex-wrap items-center justify-between gap-3">
        <div class="flex flex-wrap items-center gap-3">
          <button id="batch-mode-btn" type="button" class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text">批量模式</button>
          <button id="select-all-btn" type="button" class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text">选择</button>
          <button id="storyboard-settings-btn" type="button" class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text">分镜设置</button>
          <button id="column-settings-btn" type="button" class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text">列设置</button>
        </div>
        <div class="min-w-[220px] text-right">
          <p class="m-0 text-sm text-muted">当前项目共有 <strong id="row-count">0</strong> 个镜头。</p>
        </div>
      </div>
      <div id="batch-action-bar" class="batch-action-bar hidden mb-4 flex flex-wrap items-center gap-3 rounded-[14px] border border-border bg-surface-soft px-4 py-3">
        <span class="text-sm text-muted">批量模式已开启</span>
        <button id="delete-selected-btn" type="button" class="btn btn-secondary inline-flex items-center justify-center gap-2 rounded-[14px] bg-button px-[18px] py-[11px] text-sm font-bold text-button-text transition duration-150 hover:-translate-y-px hover:bg-button-hover">删除选中</button>
        <button id="cancel-batch-mode-btn" type="button" class="btn btn-ghost inline-flex items-center justify-center gap-2 rounded-[14px] border border-border bg-white px-[18px] py-[11px] text-sm font-bold text-[#5f6670] transition duration-150 hover:-translate-y-px hover:bg-[#f8f8f6] hover:text-text">取消</button>
      </div>
      <div class="table-card overflow-visible rounded-[14px] border border-border bg-white" id="project-export-area">

      const table = $('storyboard-table');
      table.classList.remove('batch-mode-active');
      $('project-toolbar').classList.remove('hidden');
      $('batch-action-bar').classList.add('hidden');
      // 取消所有选择
      tableBody.querySelectorAll('.row-select-checkbox').forEach(cb => cb.checked = false);
    }
    function handleColumnResize(e) {
      if (!e.target.classList.contains('resize-handle')) return;
      
      e.preventDefault();
      const th = e.target.closest('th');
      const table = th.closest('table');
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      const startX = e.clientX;
      const startWidth = th.offsetWidth;
      const colIndex = Array.from(th.parentNode.children).indexOf(th);
      
      function onMouseMove(e) {
        const newWidth = Math.max(30, startWidth + (e.clientX - startX)); // 最小宽度30px
        th.style.width = newWidth + 'px';
        
        // 同步调整tbody中对应列的所有td
        const tbodyRows = tbody.querySelectorAll('tr');
        tbodyRows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells[colIndex]) {
            cells[colIndex].style.width = newWidth + 'px';
          }
        });
      }
      
      function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        saveCurrentProjectSilently(); // 保存列宽设置
      }
      
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }
    async function saveCurrentProject() {
      if (!state.currentProjectId) return;
      updateCurrentProjectFromEditor();
      const projectSaved = await saveProject(state.projects.find(x => x.id === state.currentProjectId));
      if (!projectSaved) return;
      const rowsSaved = await saveProjectRows(state.currentProjectId, collectRowData());
      if (!rowsSaved) return;
      await loadProjects();
      showToast('项目已保存');
    }
    async function saveCurrentProjectSilently() {
      if (!state.currentProjectId) return;
      updateCurrentProjectFromEditor();
      const projectSaved = await saveProject(state.projects.find(x => x.id === state.currentProjectId));
      if (!projectSaved) return;
      await saveProjectRows(state.currentProjectId, collectRowData());
    }
    function updateCurrentProjectFromEditor() {
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const info = {};
      document.querySelectorAll('[data-info-field]').forEach(el => { info[el.dataset.infoField] = el.textContent.trim(); });
      p.info = { ...p.info, ...info };
      p.title = info.name || p.title;
      projectPageTitle.textContent = p.title;
    }
    function buildTimeWheels() {
      minuteWheel.innerHTML = ''; secondWheel.innerHTML = '';
      for (let m = 0; m <= 299; m++) { const item = document.createElement('div'); item.className = 'time-wheel-item mb-1.5 flex h-[42px] cursor-pointer items-center justify-center rounded-xl text-[18px] font-bold text-[#848890] transition duration-150 hover:bg-[#fff7dc] hover:text-[#5b5f66]'; item.dataset.value = m; item.textContent = m; item.addEventListener('click', () => { state.timePicker.minute = m; syncTimePickerUI(); item.scrollIntoView({ block: 'center', behavior: 'smooth' }); }); minuteWheel.appendChild(item); }
      for (let s = 0; s <= 59; s++) { const item = document.createElement('div'); item.className = 'time-wheel-item mb-1.5 flex h-[42px] cursor-pointer items-center justify-center rounded-xl text-[18px] font-bold text-[#848890] transition duration-150 hover:bg-[#fff7dc] hover:text-[#5b5f66]'; item.dataset.value = s; item.textContent = String(s).padStart(2, '0'); item.addEventListener('click', () => { state.timePicker.second = s; syncTimePickerUI(); item.scrollIntoView({ block: 'center', behavior: 'smooth' }); }); secondWheel.appendChild(item); }
    }
    function openTimePicker(tag) {
      state.timePicker.activeTag = tag;
      $('time-picker-title').textContent = tag.dataset.role === 'start' ? '设置开始时间' : '设置结束时间';
      const cur = parseSingleTime(tag.querySelector('.time-tag-value')?.textContent.trim() || '0:00');
      state.timePicker.minute = cur.minute; state.timePicker.second = cur.second;
      syncTimePickerUI();
      timePickerBackdrop.classList.remove('hidden');
    }
    function confirmTimePicker() {
      if (!state.timePicker.activeTag) { timePickerBackdrop.classList.add('hidden'); return; }
      const tag = state.timePicker.activeTag;
      const startTag = tag.closest('.time-cell').querySelector('.time-tag[data-role="start"] .time-tag-value');
      const endTag = tag.closest('.time-cell').querySelector('.time-tag[data-role="end"] .time-tag-value');
      const newVal = formatTime(state.timePicker.minute, state.timePicker.second);
      tag.querySelector('.time-tag-value').textContent = newVal;
      const startTot = parseSingleTime(startTag.textContent).minute * 60 + parseSingleTime(startTag.textContent).second;
      const endTot = parseSingleTime(endTag.textContent).minute * 60 + parseSingleTime(endTag.textContent).second;
      let endChanged = false;
      if (startTot > endTot) {
        if (tag.dataset.role === 'start') { endTag.textContent = startTag.textContent; endChanged = true; }
        else { startTag.textContent = endTag.textContent; }
      }
      if (tag.dataset.role === 'end' || endChanged) {
        const currentRow = tag.closest('tr');
        const nextRow = currentRow?.nextElementSibling;
        if (nextRow) {
          const nextStartTag = nextRow.querySelector('.time-tag[data-role="start"] .time-tag-value');
          if (nextStartTag) nextStartTag.textContent = endTag.textContent;
        }
      }
      timePickerBackdrop.classList.add('hidden');
      saveCurrentProjectSilently();
    }
    function syncTimePickerUI() {
      $('time-picker-current').textContent = formatTime(state.timePicker.minute, state.timePicker.second);
      minuteWheel.querySelectorAll('.time-wheel-item').forEach(item => { item.classList.toggle('active', Number(item.dataset.value) === state.timePicker.minute); });
      secondWheel.querySelectorAll('.time-wheel-item').forEach(item => { item.classList.toggle('active', Number(item.dataset.value) === state.timePicker.second); });
    }
    function parseTimeRange(v) { const parts = String(v || '0:00 - 0:00').split(/\\s*[-–]\\s*/); return { start: normalizeTime(parts[0]), end: normalizeTime(parts[1] || parts[0]) }; }
    function normalizeTime(v) { const p = parseSingleTime(v); return formatTime(p.minute, p.second); }
    function parseSingleTime(v) { const clean = String(v || '0:00').trim().replace(/\\./g, ':'); const parts = clean.split(':'); if (parts.length === 1) return { minute: Math.max(0, parseInt(parts[0]) || 0), second: 0 }; return { minute: Math.max(0, parseInt(parts[0]) || 0), second: Math.min(59, Math.max(0, parseInt(parts[1]) || 0)) }; }
    function formatTime(minute, second) { return Math.max(0, minute) + ':' + String(Math.max(0, Math.min(59, second))).padStart(2, '0'); }
    async function exportPDF() {
      if (!state.currentProjectId) return;
      saveCurrentProjectSilently();
      const p = state.projects.find(x => x.id === state.currentProjectId);
      const area = $('project-export-area');
      area.classList.add('pdf-exporting');
      try { await html2pdf().set({ margin: [0.35, 0.35, 0.35, 0.35], filename: (p?.title || '项目') + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(area).save(); } catch (e) { showToast('导出 PDF 失败'); } finally { area.classList.remove('pdf-exporting'); }
    }
    function exportJSON() {
      if (!state.currentProjectId) return;
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const payload = { version: 1, exportedAt: new Date().toISOString(), project: { title: p.title, description: p.description, info: p.info, rows: collectRowData() } };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = sanitizeFileName(p.title || '项目') + '.json'; a.click(); URL.revokeObjectURL(a.href);
      showToast('JSON 已导出');
    }
    function exportHTML() {
      if (!state.currentProjectId) return;
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const rows = collectRowData();
      const rowsHTML = rows.map((row, i) => '<tr><td>' + (i+1) + '</td><td>' + escapeHTML(row.time) + '</td><td>' + escapeHTMLWithBreak(row.dept) + '</td><td>' + (row.img ? '<img src="' + row.img + '">' : '无') + '</td><td>' + escapeHTML(row.content) + '</td><td>' + escapeHTML(row.lens) + '</td><td>' + escapeHTML(row.movement) + '</td></tr>').join('');
      const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + escapeHTML(p.title) + '</title><style>body{margin:0;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif}table{width:100%;border-collapse:collapse}th,td{padding:8px 12px;border:1px solid #ddd}th{background:#f5f5f5}img{width:80px;height:60px;object-fit:cover}</style></head><body><h1>' + escapeHTML(p.title) + '</h1><p>' + escapeHTML(p.description || '') + '</p><table><thead><tr><th>#</th><th>时间</th><th>部门</th><th>参考图</th><th>拍摄内容</th><th>焦段</th><th>运镜</th></tr></thead><tbody>' + rowsHTML + '</tbody></table></body></html>';
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = sanitizeFileName(p.title || '项目') + '.html'; a.click(); URL.revokeObjectURL(a.href);
      showToast('HTML 已导出');
    }
    function ensureCSVImportControls() {
      if (!$('project-csv-input')) {
        const input = document.createElement('input');
        input.type = 'file';
        input.id = 'project-csv-input';
        input.accept = '.csv,text/csv';
        input.hidden = true;
        document.body.appendChild(input);
      }
      if (!$('import-csv-btn')) {
        const menu = $('import-menu');
        if (!menu) return;
        const btn = document.createElement('button');
        btn.className = 'action-menu-item w-full rounded-[10px] px-3 py-2.5 text-left text-[13px] font-bold text-[#5f6670] transition duration-150 hover:bg-[#f8f8f6] hover:text-text';
        btn.id = 'import-csv-btn';
        btn.type = 'button';
        btn.textContent = '导入 CSV';
        menu.appendChild(btn);
      }
    }
    async function handleProjectJSONImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async ev => {
        try {
          const data = JSON.parse(ev.target.result);
          const payload = data?.project || data;
          if (!payload?.rows) { showToast('无效的项目文件'); return; }
          const newP = await createNewProject({ title: payload.title || '导入的项目', description: payload.description || '', password: payload.password || '', ...(payload.info || {}) });
          if (newP) { await saveProjectRows(newP.id, payload.rows.map(r => ({ time: r.time || '0:00 - 0:00', dept: r.dept || '', img: r.img || '', content: r.content || '', lens: r.lens || '', movement: r.movement || '' }))); await loadProjects(); showToast('项目已导入'); }
        } catch (err) { showToast('文件解析失败'); }
        e.target.value = '';
      };
      reader.readAsText(file);
    }
    async function handleProjectCSVImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async ev => {
        try {
          const parsed = parseCSVText(ev.target.result);
          if (!parsed.headers.length || !parsed.rows.length) { showToast('CSV 文件为空'); return; }
          const mappedRows = parsed.rows.map(row => mapCSVRowToProjectRow(row, parsed.headers)).filter(row => Object.values(row).some(Boolean));
          if (!mappedRows.length) { showToast('CSV 中没有可导入的镜头数据'); return; }
          state.pendingCSVImport = { rows: mappedRows, fileName: file.name };
          $('csv-file-name').textContent = file.name;
          $('confirm-csv-import-btn').disabled = false;
          showToast('CSV 已准备好，点击确定导入当前项目');
        } catch (err) { showToast('CSV 解析失败'); }
        e.target.value = '';
      };
      reader.readAsText(file, 'utf-8');
    }
    function openCSVImportModal() {
      if (!state.currentProjectId) { showToast('请先打开一个项目'); return; }
      state.pendingCSVImport = null;
      $('csv-file-name').textContent = '支持 .csv 格式';
      $('confirm-csv-import-btn').disabled = true;
      $('csv-import-modal-backdrop').classList.remove('hidden');
    }
    function closeCSVImportModal() {
      $('csv-import-modal-backdrop').classList.add('hidden');
      const input = $('project-csv-input');
      if (input) input.value = '';
      state.pendingCSVImport = null;
    }
    async function confirmCSVImport() {
      if (!state.currentProjectId) { showToast('请先打开一个项目'); closeCSVImportModal(); return; }
      const importData = state.pendingCSVImport;
      if (!importData?.rows?.length) { showToast('请先选择 CSV 文件'); return; }
      const success = await saveProjectRows(state.currentProjectId, importData.rows);
      if (success) {
        await loadProjectIntoEditor(state.currentProjectId);
        closeCSVImportModal();
        showToast('CSV 已导入，当前项目已覆盖');
      }
    }
    function parseCSVText(text) {
      const rows = [];
      let current = '';
      let row = [];
      let inQuotes = false;
      const source = String(text || '').replace(/^\uFEFF/, '');
      for (let i = 0; i < source.length; i++) {
        const char = source[i];
        const next = source[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
          continue;
        }
        if (char === ',' && !inQuotes) {
          row.push(current);
          current = '';
          continue;
        }
        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
          row = [];
          current = '';
          continue;
        }
        current += char;
      }
      row.push(current);
      if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
      const headers = (rows.shift() || []).map(normalizeCSVHeader);
      return {
        headers,
        rows: rows.map(cols => Object.fromEntries(headers.map((header, index) => [header, String(cols[index] || '').trim()])))
      };
    }
    function normalizeCSVHeader(header) {
      return String(header || '').trim().toLowerCase().replace(/^\uFEFF/, '');
    }
    function mapCSVRowToProjectRow(row, headers) {
      const pick = (...keys) => {
        const key = keys.find(candidate => headers.includes(candidate));
        return key ? row[key] || '' : '';
      };
      const start = pick('start', 'start time', 'start_time', '开始', '开始时间', '起始时间', 'in');
      const end = pick('end', 'end time', 'end_time', '结束', '结束时间', '截止时间', 'out');
      const directTime = pick('time', '时间', '时长', '镜头时间', '时段');
      const time = directTime || (start || end ? normalizeTime(start || '0:00') + ' - ' + normalizeTime(end || start || '0:00') : '0:00 - 0:00');
      return {
        time,
        dept: pick('dept', 'department', '部门', '场景', 'scene'),
        img: pick('img', 'image', '图片', '参考图', 'reference', 'reference image'),
        content: pick('content', '内容', '拍摄内容', 'description', 'shot', 'shot content'),
        lens: pick('lens', '焦段', '镜头', 'camera lens'),
        movement: pick('movement', '运镜', 'camera movement', 'move')
      };
    }
    function initSortable() { if (state.sortable) state.sortable.destroy(); state.sortable = new Sortable(tableBody, { handle: '.drag-handle', animation: 160, ghostClass: 'sortable-ghost', onEnd: () => { updateRowNumbers(); saveCurrentProjectSilently(); } }); }
    function toggleMenu(e, menuId) { e.stopPropagation(); const m = $(menuId); closeMenus(); if (!m.classList.contains('open')) m.classList.add('open'); }
    function closeMenus() { document.querySelectorAll('.action-menu.open').forEach(m => m.classList.remove('open')); }
    function setSync(status, text) { syncIndicator.dataset.status = status; syncIndicator.querySelector('.sync-text').textContent = text; }
    function showToast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(state.toastTimer); state.toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200); }
    function formatDate(v) { if (!v) return '未记录'; const d = new Date(v); if (isNaN(d.getTime())) return String(v); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
    function escapeHTML(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escapeHTMLWithBreak(v) { return escapeHTML(v).replace(/\\n/g, '<br>'); }
    function sanitizeFileName(n) { return String(n).replace(/[\\\\/:*?"<>|]+/g, '_').trim() || '项目'; }
    function debounce(fn, delay) { let t = null; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); }; }
  </script>
</body>
