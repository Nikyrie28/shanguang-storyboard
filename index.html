<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪光分镜</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    :root{--bg:#fff;--surface:#fff;--surface-soft:#faf9f7;--border:#ece8e1;--text:#2d2f33;--muted:#8b8f97;--primary:#f3cf69;--button-bg:#f6d56f;--button-hover:#efcc61;--button-text:#7f6028;--success:#2bb673;--danger:#e5484d}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}
    .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#fdfbf7 0%,#faf5e8 100%)}
    .auth-card{width:100%;max-width:400px;padding:40px 36px;background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(28,31,36,0.08);text-align:center}
    .auth-logo{font-size:56px;margin-bottom:12px}
    .auth-title{margin:0 0 8px;font-size:28px;font-weight:800}
    .auth-subtitle{margin:0 0 32px;color:var(--muted);font-size:14px}
    .auth-tabs{display:flex;gap:4px;margin-bottom:28px;padding:4px;background:#f5f5f3;border-radius:12px}
    .auth-tab{flex:1;padding:10px 16px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .auth-tab.active{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(28,31,36,0.06)}
    .auth-form{display:flex;flex-direction:column;gap:16px}
    .auth-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:#fff;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
    .auth-input:focus{border-color:#e6cb7c;box-shadow:0 0 0 4px rgba(246,213,111,.15)}
    .auth-input::placeholder{color:#c0b8ac}
    .auth-btn{width:100%;padding:14px 20px;border:none;border-radius:12px;background:var(--button-bg);color:var(--button-text);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(246,213,111,.28);transition:all .2s}
    .auth-btn:hover{background:var(--button-hover);transform:translateY(-1px)}
    .auth-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
    .auth-error{padding:12px;border-radius:10px;background:#fff5f5;color:var(--danger);font-size:13px;text-align:left}
    .auth-hint{margin-top:20px;color:var(--muted);font-size:13px}
    .app-shell{width:100%;max-width:none;margin:0;padding:12px 16px 24px}
    .user-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:8px 16px;margin-bottom:8px}
    .user-bar-brand{display:flex;align-items:center;min-width:0}
    .user-bar-brand-logo{display:block;height:34px;width:auto;max-width:min(188px,42vw)}
    .user-bar-actions{margin-left:auto;display:flex;align-items:center;justify-content:flex-end;gap:12px;min-width:0;flex-wrap:wrap}
    .user-email{min-width:0;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:13px}
    .btn-logout{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-logout:hover{background:#f8f8f6;color:var(--text)}
    .home-shell{display:grid;grid-template-columns:74px minmax(0,1fr);width:min(100%,1760px);min-height:calc(100vh - 24px);margin:0 auto;border:1px solid var(--border);border-radius:22px;overflow:hidden;background:#fff}
    .home-sidebar{display:flex;flex-direction:column;align-items:center;gap:16px;padding:18px 10px;border-right:1px solid var(--border);background:linear-gradient(180deg,#fcfcfb 0%,#f8f8f6 100%)}
    .sidebar-logo{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;color:#f0be3d;font-size:28px;font-weight:800}
    .sidebar-divider{width:42px;height:1px;background:var(--border);margin:2px 0 8px}
    .sidebar-item{width:54px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:16px;color:#b0b5bc;text-align:center;font-size:11px;font-weight:700}
    .sidebar-item.active{background:linear-gradient(180deg,#f7f4ff 0%,#eef1ff 100%);color:#8f88d8;box-shadow:inset 0 0 0 1px #ece9fb}
    .sidebar-item-icon{font-size:22px;line-height:1}
    .home-main{padding:26px 28px 48px;background:#fff}
    .home-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
    .home-title{margin:0;font-size:18px;font-weight:800;color:var(--text)}
    .home-sortbar{display:flex;align-items:center;gap:14px;margin-bottom:24px;color:var(--muted);font-size:13px;font-weight:700}
    .home-sortbar .active{color:var(--text)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border:1px solid transparent;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,background .2s,color .2s}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary,.btn-secondary{background:var(--button-bg);color:var(--button-text);box-shadow:0 6px 18px rgba(246,213,111,.28)}
    .btn-primary:hover,.btn-secondary:hover{background:var(--button-hover)}
    .btn-ghost{background:#fff;color:#5f6670;border:1px solid var(--border)}
    .btn-ghost:hover{background:#f8f8f6;color:var(--text)}
    .project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,150px));gap:28px 44px;align-items:start}
    .project-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0;border:none;background:transparent;overflow:visible}
    .project-folder{position:relative;display:flex;align-items:flex-end;justify-content:center;width:118px;height:94px;margin:0 auto;border:none;border-radius:10px;background:linear-gradient(180deg,#f4bf36 0%,#f7d76a 72%);box-shadow:inset 0 -10px 18px rgba(255,255,255,.24);cursor:pointer;transition:transform .18s}
    .project-folder::before{content:"";position:absolute;top:-7px;left:14px;width:32px;height:14px;border-radius:10px 10px 0 0;background:linear-gradient(180deg,#edb934 0%,#f3ca61 100%)}
    .project-folder::after{content:"";position:absolute;left:9px;right:9px;top:18px;bottom:12px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,250,233,.88))}
    .project-folder:hover{transform:translateY(-2px)}
    .project-folder-cover{position:absolute;left:11px;right:11px;top:22px;bottom:16px;z-index:1;border-radius:7px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,249,237,.85))}
    .project-card.create-card .project-folder{background:#f7f7f6;box-shadow:inset 0 0 0 1px #ece8e1;align-items:center}
    .project-card.create-card .project-folder::before{background:#f0efec}
    .project-card.create-card .project-folder::after{display:none}
    .create-plus{position:relative;z-index:1;font-size:34px;line-height:1;color:#252a31;font-weight:700}
    .project-card h3{margin:0;font-size:14px;font-weight:700;text-align:center}
    .project-card p,.project-created-at{margin:0;color:var(--muted);font-size:12px}
    .project-caption{width:118px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
    .project-created-at{color:#9ea3aa;text-align:center}
    .project-actions{position:absolute;top:-6px;right:-8px;z-index:5;display:flex;gap:6px;opacity:0;transform:translateY(4px);transition:opacity .16s}
    .project-card:hover .project-actions{opacity:1;transform:translateY(0)}
    .folder-action{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #ece8e1;border-radius:10px;background:#fff;color:#666d76;cursor:pointer}
    .folder-action.delete{color:#cf5a5f}
    .empty-state{padding:22px 0 0;color:var(--muted);font-size:13px}
    .page-head{display:flex;justify-content:space-between;align-items:center;gap:28px;margin-bottom:14px;padding:6px 4px 0}
    .page-head-left{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:4px;min-width:220px;max-width:320px}
    .project-logo-wrap{width:120px;height:32px;flex:0 0 auto;display:flex;align-items:center;justify-content:flex-start;overflow:hidden}
    .project-logo{width:112px;height:auto;display:block;transform:none}
    .page-head-copy{min-width:0;padding:0;display:flex;flex-direction:column;justify-content:center}
    .page-head-left h2{margin:0 0 2px;font-size:22px;line-height:1.08;font-weight:800;letter-spacing:-.01em}
    .page-head-left p{margin:0;color:#a3a9b2;font-size:14px;line-height:1.15;font-weight:400}
    .page-actions{display:flex;flex-wrap:wrap;gap:10px}
    .action-group{position:relative}
    .action-menu{position:absolute;top:calc(100% + 8px);right:0;z-index:30;min-width:158px;display:none;padding:8px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 14px 32px rgba(28,31,36,.08)}
    .action-menu.open{display:block}
    .action-menu-item{width:100%;padding:10px 12px;border:none;border-radius:10px;background:transparent;color:#5f6670;text-align:left;font:inherit;font-size:13px;font-weight:700;cursor:pointer}
    .action-menu-item:hover{background:#f8f8f6;color:var(--text)}
    .project-info-bar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;padding:14px;margin-bottom:18px;border:1px solid var(--border);border-radius:14px;background:var(--surface)}
    .info-field{padding:12px 14px;border-radius:12px;background:var(--surface-soft);border:1px solid var(--border)}
    .info-field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:700}
    .info-field div[contenteditable="true"]{min-height:24px;outline:none;font-weight:700}
    .info-field div[contenteditable="true"]:focus{background:#fffdf4;border-radius:8px}
    .table-card{position:relative;padding:0;border:1px solid var(--border);border-radius:14px;background:var(--surface);overflow:hidden}
    .table-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px 0}
    .table-toolbar p{margin:0;color:var(--muted);font-size:14px}
    .table-wrap{overflow-x:auto}
    table{width:100%;min-width:1040px;border-collapse:collapse;table-layout:fixed;font-size:13px;line-height:1.6}
    th,td{padding:12px 14px;border-right:1px dashed #ddd8cf;border-bottom:1px solid #f3f1ec;border-top:none;border-left:none;vertical-align:top;text-align:left;background:#fff}
    th{background:#f5f5f3;color:#5f6670;font-size:12px;font-weight:800}
    tr:last-child td{border-bottom:none}
    th:last-child,td:last-child{border-right:none}
    td[contenteditable="true"]:focus{outline:2px solid rgba(246,213,111,.7);background:#fffdf6}
    .col-drag{width:42px;text-align:center;padding:0}
    .col-index{width:54px;text-align:center;color:var(--muted);font-weight:700}
    .drag-handle{display:inline-flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:52px;cursor:grab;color:#979ca4;font-size:16px}
    .sortable-ghost{opacity:.4;background:#fff9e6!important}
    .time-cell{position:relative;width:140px}
    .time-range{display:flex;flex-direction:column;gap:6px;padding-right:8px}
    .time-tag{display:inline-flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border:1px solid #ebe6de;border-radius:10px;background:#fcfbf8;color:#555b63;font-weight:800;cursor:pointer;transition:background .2s}
    .time-tag:hover{background:#fff9e7;transform:translateY(-1px)}
    .time-tag-label{font-size:11px;color:#9a9ea6}
    .time-tag-value{font-size:14px}
    .time-separator{align-self:center;color:#c0b9ac;font-size:11px}
    .row-delete-anchor{position:absolute;left:-13px;top:0;bottom:0;width:26px;display:flex;align-items:center;justify-content:center}
    .icon-btn{width:26px;height:26px;border:none;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
    .icon-btn:hover{transform:scale(1.08)}
    .row-delete-btn{opacity:0;pointer-events:none;background:var(--danger);color:#fff}
    .time-cell:hover .row-delete-btn{opacity:1;pointer-events:auto}
    .row-copy-btn{width:28px;height:28px;border-radius:10px;background:#f7f6f3;color:#666d76}
    .action-col{width:62px;text-align:center}
    .image-box{position:relative;width:92px;height:72px;margin:0 auto}
    .upload-box{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #ece8e1;border-radius:8px;background:#fff;cursor:pointer;transition:border-color .2s}
    .upload-box:hover{border-color:#e4c978;background:#fffaf0}
    .upload-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .plus-sign{font-size:24px;color:#2f343a;font-weight:700}
    .img-delete-btn{position:absolute;top:-8px;right:-8px;opacity:0;pointer-events:none;background:var(--danger);color:#fff}
    .image-box.has-image:hover .img-delete-btn{opacity:1;pointer-events:auto}
    .add-row-btn{width:100%;padding:16px;border:none;border-top:1px solid var(--border);background:#fff;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer}
    .add-row-btn:hover{background:#fcfbf8;color:var(--text)}
    .modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(22,24,28,.24);backdrop-filter:blur(5px);z-index:1000}
    .modal{width:min(560px,100%);padding:24px;border-radius:18px;background:rgba(255,255,255,.98);border:1px solid var(--border);box-shadow:0 18px 48px rgba(32,35,40,.1)}
    .modal h3{margin:0 0 8px;font-size:24px}
    .modal p{margin:0 0 18px;color:var(--muted);line-height:1.7}
    .form-grid{display:grid;gap:14px}
    .form-grid.two-col{grid-template-columns:repeat(2,minmax(0,1fr))}
    .field label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:var(--muted)}
    .field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--text);font:inherit;outline:none}
    .field input:focus,.field textarea:focus{border-color:#e6cb7c;box-shadow:0 0 0 4px rgba(246,213,111,.18)}
    .field textarea{min-height:96px;resize:vertical}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .hint{margin-top:10px;color:var(--muted);font-size:12px}
    .error-text{min-height:20px;margin-top:10px;color:var(--danger);font-size:13px;font-weight:700}
    .time-picker-modal{width:min(420px,100%);padding:22px}
    .time-picker-header{margin-bottom:14px;text-align:center}
    .time-picker-title{margin:0 0 6px;font-size:22px;font-weight:800}
    .time-picker-current{display:inline-flex;align-items:center;justify-content:center;min-width:120px;padding:8px 16px;border-radius:999px;background:#fff7da;color:var(--button-text);font-size:28px;font-weight:800}
    .time-picker-wheels{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;margin-top:14px}
    .time-wheel-colon{padding-top:78px;color:#c0b8a7;font-size:28px;font-weight:800}
    .time-wheel-label{margin-bottom:8px;text-align:center;color:var(--muted);font-size:12px;font-weight:700}
    .time-wheel{height:220px;overflow-y:auto;padding:12px 10px;border:1px solid var(--border);border-radius:18px;background:#fbfaf7;scroll-behavior:smooth}
    .time-wheel-item{display:flex;align-items:center;justify-content:center;height:42px;margin-bottom:6px;border-radius:12px;color:#848890;font-size:18px;font-weight:700;cursor:pointer;transition:background .15s}
    .time-wheel-item:hover{background:#fff7dc;color:#5b5f66}
    .time-wheel-item.active{background:#f6d56f;color:var(--button-text);transform:scale(1.02)}
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(16px);padding:12px 18px;border-radius:999px;background:rgba(20,27,38,.94);color:#fff;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .22s;z-index:1200}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .pdf-exporting .drag-handle,.pdf-exporting .col-drag,.pdf-exporting .col-index,.pdf-exporting .action-col,.pdf-exporting .row-delete-anchor,.pdf-exporting .row-copy-btn,.pdf-exporting .img-delete-btn,.pdf-exporting .add-row-btn,.pdf-exporting .table-toolbar,.pdf-exporting .plus-sign{display:none!important}
    .loading-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);z-index:2000}
    .loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sync-indicator{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
    .sync-indicator.synced{background:#e8f5e9;color:var(--success)}
    .sync-indicator.syncing{background:#fff7da;color:var(--button-text)}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
    .sync-indicator.syncing .sync-dot{animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @media(max-width:1100px){.project-info-bar{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:760px){.app-shell{padding:0}.user-bar{padding:12px 14px 8px;align-items:flex-start;flex-wrap:wrap}.user-bar-brand{flex-basis:100%}.user-bar-brand-logo{height:30px;max-width:156px}.user-bar-actions{width:100%;gap:8px}.user-email{max-width:none;flex:1 1 160px}.page-head{flex-direction:column;align-items:flex-start;gap:12px}.page-head-left{gap:4px;min-width:0;max-width:none}.project-logo-wrap{width:108px;height:28px}.project-logo{width:100px}.page-head-left h2{font-size:20px;margin-bottom:2px}.page-head-left p{font-size:13px}.project-info-bar,.form-grid.two-col{grid-template-columns:1fr}.home-shell{grid-template-columns:1fr;border:none}.home-sidebar{flex-direction:row;border-right:none;border-bottom:1px solid var(--border);padding:10px 12px}.home-main{padding:18px 14px 28px}.project-grid{grid-template-columns:repeat(2,1fr);gap:22px 18px}}
  </style>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="loading-spinner"></div></div>
  <div id="auth-view" class="auth-container hidden">
    <div class="auth-card">
      <div class="auth-logo">⚡</div>
      <h1 class="auth-title">闪光分镜</h1>
      <p class="auth-subtitle">分镜管理，云端同步</p>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <input type="email" class="auth-input" id="login-email" placeholder="邮箱地址" required>
        <input type="password" class="auth-input" id="login-password" placeholder="密码" required>
        <div id="login-error" class="auth-error hidden"></div>
        <button type="submit" class="auth-btn" id="login-btn">登录</button>
      </form>
      <form id="register-form" class="auth-form hidden">
        <input type="email" class="auth-input" id="register-email" placeholder="邮箱地址" required>
        <input type="password" class="auth-input" id="register-password" placeholder="密码（至少6位）" required minlength="6">
        <input type="text" class="auth-input" id="register-username" placeholder="昵称（选填）">
        <div id="register-error" class="auth-error hidden"></div>
        <button type="submit" class="auth-btn" id="register-btn">注册</button>
      </form>
      <p class="auth-hint" id="auth-hint"></p>
    </div>
  </div>
  <div id="app-view" class="app-shell hidden">
    <div class="user-bar">
      <div class="user-bar-brand">
        <img class="user-bar-brand-logo" src="./logo-frame-2.png" alt="闪光 Logo">
      </div>
      <div class="user-bar-actions">
        <span class="sync-indicator synced" id="sync-indicator"><span class="sync-dot"></span><span class="sync-text">已同步</span></span>
        <span class="user-email" id="user-email"></span>
        <button class="btn-logout" id="logout-btn">退出登录</button>
      </div>
    </div>
    <section id="home-view">
      <div class="home-shell">
        <aside class="home-sidebar">
          <div class="sidebar-logo">⚡</div>
          <div class="sidebar-divider"></div>
          <div class="sidebar-item active"><div class="sidebar-item-icon">🗂</div><div>项目</div></div>
        </aside>
        <div class="home-main">
          <div class="home-header"><h1 class="home-title">我的项目</h1></div>
          <div class="home-sortbar"><span>排序</span><span class="active">自定义</span></div>
          <div id="project-grid" class="project-grid"></div>
          <div id="empty-projects" class="empty-state hidden">还没有项目，点击左侧第一个卡片创建新项目。</div>
        </div>
      </div>
    </section>
    <section id="project-view" class="hidden">
      <div class="page-head">
        <div class="page-head-left">

    const supabaseUrl = envConfig.url || 'https://ukybipqbssbyfdcdowoh.supabase.co';

    const $ = id => document.getElementById(id);

    document.addEventListener('DOMContentLoaded', async () => {

    async function checkAuth() {

    function bindAuthEvents() {
      if (state.authEventsBound) return;

      document.querySelectorAll('.auth-tab').forEach(tab => {

          document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));

        e.preventDefault();
        const email = $('login-email').value, password = $('login-password').value;

        if (event === 'SIGNED_IN' && session?.user) { state.user = session.user; showApp(); loadProjects(); }

    function bindAppEvents() {
      if (state.appEventsBound) return;

      $('export-json-btn').addEventListener('click', () => { closeMenus(); exportJSON(); });

      tableBody.addEventListener('drop', e => { const ub = e.target.closest('.upload-box'); if (ub) { e.preventDefault(); ub.classList.remove('drag-over'); const file = e.dataTransfer.files[0]; if (file?.type.startsWith('image/')) displayImageInBox(file, ub); } });
      $('project-info-bar').addEventListener('input', debounce(saveCurrentProjectSilently, 800));

      initSortable();
    }
    async function loadProjects() {
      setSync('syncing', '同步中...');
      const { data, error } = await supabase.from('projects').select('*').eq('user_id', state.user.id).order('created_at', { ascending: false });
      if (error) { showToast('加载项目失败'); setSync('offline', '同步失败'); return; }
      state.projects = data || [];
      renderProjectCards();
      setSync('synced', '已同步');
    }
    async function saveProject(project) {
      setSync('syncing', '保存中...');
      const { error } = await supabase.from('projects').upsert(project);
      if (error) { showToast('保存失败'); setSync('offline', '保存失败'); return false; }
      setSync('synced', '已同步');
      return true;
    }
    async function createNewProject(data) {
      setSync('syncing', '创建中...');
      const { data: newProject, error } = await supabase.from('projects').insert({
        user_id: state.user.id, title: data.title, description: data.description || '', password: data.password || '',
        info: { name: data.title, date: data.date || '', director: data.director || '', location: data.location || '', duration: data.duration || '' }
      }).select().single();
      if (error) { showToast('创建失败'); setSync('offline', '创建失败'); return null; }
      await loadProjects();
      return newProject;
    }
    async function removeProject(projectId) {
      setSync('syncing', '删除中...');
      const { error } = await supabase.from('projects').delete().eq('id', projectId).eq('user_id', state.user.id);
      if (error) { showToast('删除失败'); setSync('offline', '删除失败'); return false; }
      await loadProjects();
      return true;
    }
    async function loadProjectRows(projectId) {
      const { data } = await supabase.from('project_rows').select('*').eq('project_id', projectId).eq('user_id', state.user.id).order('row_order', { ascending: true });
      return data || [];
    }
    async function saveProjectRows(projectId, rows) {
      setSync('syncing', '保存中...');
      const { error: deleteError } = await supabase.from('project_rows').delete().eq('project_id', projectId).eq('user_id', state.user.id);
      if (deleteError) { showToast('镜头保存失败'); setSync('offline', '保存失败'); return false; }
      if (rows.length > 0) {
        const rowsToInsert = rows.map((row, index) => ({ project_id: projectId, user_id: state.user.id, row_order: index, time: row.time || '0:00 - 0:00', dept: row.dept || '', img: row.img || '', content: row.content || '', lens: row.lens || '', movement: row.movement || '' }));
        const { error: insertError } = await supabase.from('project_rows').insert(rowsToInsert);
        if (insertError) { showToast('镜头保存失败'); setSync('offline', '保存失败'); return false; }
      }
      setSync('synced', '已同步');
      return true;
    }
    function renderProjectCards() {
      projectGrid.innerHTML = '';
      emptyProjects.classList.toggle('hidden', state.projects.length > 0);

    function handleProjectCardAction(e) {
      const { action, id } = e.currentTarget.dataset;

      else if (action === 'edit-project') openProjectModal(id);
      else if (action === 'delete-project') deleteProject(id);

    function openProjectModal(projectId = null) {
      state.editingProjectId = projectId;

      const fields = getProjectModalFields();

        const p = state.projects.find(x => x.id === projectId);

      } else Object.values(fields).forEach(f => f.value = '');

    }
    function getProjectModalFields() { return { name: $('project-name-input'), password: $('project-password-input'), date: $('project-date-input'), director: $('project-director-input'), location: $('project-location-input'), duration: $('project-duration-input'), desc: $('project-desc-input') }; }
    async function submitProjectModal() {
      const fields = getProjectModalFields();
      if (!fields.name.value.trim()) { $('project-modal-error').textContent = '请输入项目名称'; return; }

        const p = state.projects.find(x => x.id === state.editingProjectId);

      const { start, end } = parseTimeRange(row.time || '0:00 - 0:00');
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="col-drag"><span class="drag-handle">☰</span></td><td class="col-index"></td><td class="time-cell"><div class="row-delete-anchor"><button class="icon-btn row-delete-btn">✕</button></div><div class="time-range"><button class="time-tag" data-role="start"><span class="time-tag-label">开始</span><span class="time-tag-value">' + escapeHTML(start) + '</span></button><div class="time-separator">至</div><button class="time-tag" data-role="end"><span class="time-tag-label">结束</span><span class="time-tag-value">' + escapeHTML(end) + '</span></button></div></td><td contenteditable="true">' + escapeHTMLWithBreak(row.dept || '点击输入部门') + '</td><td><div class="image-box ' + (row.img ? 'has-image' : '') + '"><button class="icon-btn img-delete-btn">✕</button><div class="upload-box"><span class="plus-sign">+</span>' + (row.img ? '<img src="' + row.img + '">' : '') + '</div></div></td><td contenteditable="true">' + escapeHTML(row.content || '点击输入拍摄内容') + '</td><td contenteditable="true">' + escapeHTML(row.lens || '点击输入焦段') + '</td><td contenteditable="true">' + escapeHTML(row.movement || '点击输入运镜') + '</td><td class="action-col"><button class="icon-btn row-copy-btn">⎘</button></td>';
      return tr;
    }
    function handleTableClick(e) {
      if (e.target.closest('.row-delete-btn')) { e.target.closest('tr').remove(); updateRowNumbers(); saveCurrentProjectSilently(); return; }
      if (e.target.closest('.row-copy-btn')) { const tr = e.target.closest('tr'); tr.after(createRowElement(collectRowDataFromTr(tr))); updateRowNumbers(); saveCurrentProjectSilently(); showToast('已复制'); return; }
      if (e.target.closest('.img-delete-btn')) { clearImageBox(e.target.closest('.image-box')); saveCurrentProjectSilently(); return; }
      if (e.target.closest('.time-tag')) { openTimePicker(e.target.closest('.time-tag')); return; }
      if (e.target.closest('.upload-box')) { state.currentUploadBox = e.target.closest('.upload-box'); imageInput.click(); }
    }
    function handleImageInputChange(e) {
      const file = e.target.files[0];
      if (file && state.currentUploadBox) displayImageInBox(file, state.currentUploadBox);
      e.target.value = '';
      state.currentUploadBox = null;
    }
    function displayImageInBox(file, uploadBox) {
      const reader = new FileReader();
      reader.onload = e => {
        let img = uploadBox.querySelector('img');
        if (!img) { img = document.createElement('img'); uploadBox.appendChild(img); }
        img.src = e.target.result;
        const plus = uploadBox.querySelector('.plus-sign');
        if (plus) plus.style.display = 'none';
        uploadBox.closest('.image-box').classList.add('has-image');
        saveCurrentProjectSilently();
      };
      reader.readAsDataURL(file);
    }
    function clearImageBox(imageBox) {
      const uploadBox = imageBox.querySelector('.upload-box');
      const img = uploadBox.querySelector('img');
      const plus = uploadBox.querySelector('.plus-sign');
      if (img) img.remove();
      if (plus) plus.style.display = '';
      imageBox.classList.remove('has-image');
    }
    function collectRowData() { return Array.from(tableBody.querySelectorAll('tr')).map(tr => collectRowDataFromTr(tr)); }
    function collectRowDataFromTr(tr) {
      const cells = tr.querySelectorAll('td');
      const img = tr.querySelector('.upload-box img');
      const tvs = tr.querySelectorAll('.time-tag-value');
      return { time: (tvs[0]?.textContent.trim() || '0:00') + ' - ' + (tvs[1]?.textContent.trim() || '0:00'), dept: htmlToPlain(cells[3]?.innerHTML || ''), img: img?.src || '', content: cells[5]?.innerText.trim() || '', lens: cells[6]?.innerText.trim() || '', movement: cells[7]?.innerText.trim() || '' };
    }
    function htmlToPlain(html) { return html.replace(/<br\s*\/?>/gi, '\n').replace(/&nbsp;/g, ' ').replace(/<[^>]+>/g, '').trim(); }
    function updateRowNumbers() { Array.from(tableBody.querySelectorAll('tr')).forEach((tr, i) => { const c = tr.querySelector('.col-index'); if (c) c.textContent = i + 1; }); rowCount.textContent = tableBody.querySelectorAll('tr').length; }
    async function saveCurrentProject() {
      if (!state.currentProjectId) return;
      updateCurrentProjectFromEditor();
      const projectSaved = await saveProject(state.projects.find(x => x.id === state.currentProjectId));
      if (!projectSaved) return;
      const rowsSaved = await saveProjectRows(state.currentProjectId, collectRowData());
      if (!rowsSaved) return;
      await loadProjects();
      showToast('项目已保存');
    }
    async function saveCurrentProjectSilently() {
      if (!state.currentProjectId) return;
      updateCurrentProjectFromEditor();
      const projectSaved = await saveProject(state.projects.find(x => x.id === state.currentProjectId));
      if (!projectSaved) return;
      await saveProjectRows(state.currentProjectId, collectRowData());
    }
    function updateCurrentProjectFromEditor() {
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const info = {};
      document.querySelectorAll('[data-info-field]').forEach(el => { info[el.dataset.infoField] = el.textContent.trim(); });
      p.info = { ...p.info, ...info };
      p.title = info.name || p.title;
      projectPageTitle.textContent = p.title;
    }
    function buildTimeWheels() {
      minuteWheel.innerHTML = ''; secondWheel.innerHTML = '';
      for (let m = 0; m <= 299; m++) { const item = document.createElement('div'); item.className = 'time-wheel-item'; item.dataset.value = m; item.textContent = m; item.addEventListener('click', () => { state.timePicker.minute = m; syncTimePickerUI(); item.scrollIntoView({ block: 'center', behavior: 'smooth' }); }); minuteWheel.appendChild(item); }
      for (let s = 0; s <= 59; s++) { const item = document.createElement('div'); item.className = 'time-wheel-item'; item.dataset.value = s; item.textContent = String(s).padStart(2, '0'); item.addEventListener('click', () => { state.timePicker.second = s; syncTimePickerUI(); item.scrollIntoView({ block: 'center', behavior: 'smooth' }); }); secondWheel.appendChild(item); }
    }
    function openTimePicker(tag) {
      state.timePicker.activeTag = tag;
      $('time-picker-title').textContent = tag.dataset.role === 'start' ? '设置开始时间' : '设置结束时间';
      const cur = parseSingleTime(tag.querySelector('.time-tag-value')?.textContent.trim() || '0:00');
      state.timePicker.minute = cur.minute; state.timePicker.second = cur.second;
      syncTimePickerUI();
      timePickerBackdrop.classList.remove('hidden');
    }
    function confirmTimePicker() {
      if (!state.timePicker.activeTag) { timePickerBackdrop.classList.add('hidden'); return; }
      const tag = state.timePicker.activeTag;
      const startTag = tag.closest('.time-cell').querySelector('.time-tag[data-role="start"] .time-tag-value');
      const endTag = tag.closest('.time-cell').querySelector('.time-tag[data-role="end"] .time-tag-value');
      const newVal = formatTime(state.timePicker.minute, state.timePicker.second);
      tag.querySelector('.time-tag-value').textContent = newVal;
      const startTot = parseSingleTime(startTag.textContent).minute * 60 + parseSingleTime(startTag.textContent).second;
      const endTot = parseSingleTime(endTag.textContent).minute * 60 + parseSingleTime(endTag.textContent).second;
      if (startTot > endTot) { if (tag.dataset.role === 'start') endTag.textContent = startTag.textContent; else startTag.textContent = endTag.textContent; }
      timePickerBackdrop.classList.add('hidden');
      saveCurrentProjectSilently();
    }
    function syncTimePickerUI() {
      $('time-picker-current').textContent = formatTime(state.timePicker.minute, state.timePicker.second);
      minuteWheel.querySelectorAll('.time-wheel-item').forEach(item => { item.classList.toggle('active', Number(item.dataset.value) === state.timePicker.minute); });
      secondWheel.querySelectorAll('.time-wheel-item').forEach(item => { item.classList.toggle('active', Number(item.dataset.value) === state.timePicker.second); });
    }
    function parseTimeRange(v) { const parts = String(v || '0:00 - 0:00').split(/\\s*[-–]\\s*/); return { start: normalizeTime(parts[0]), end: normalizeTime(parts[1] || parts[0]) }; }
    function normalizeTime(v) { const p = parseSingleTime(v); return formatTime(p.minute, p.second); }
    function parseSingleTime(v) { const clean = String(v || '0:00').trim().replace(/\\./g, ':'); const parts = clean.split(':'); if (parts.length === 1) return { minute: Math.max(0, parseInt(parts[0]) || 0), second: 0 }; return { minute: Math.max(0, parseInt(parts[0]) || 0), second: Math.min(59, Math.max(0, parseInt(parts[1]) || 0)) }; }
    function formatTime(minute, second) { return Math.max(0, minute) + ':' + String(Math.max(0, Math.min(59, second))).padStart(2, '0'); }
    async function exportPDF() {
      if (!state.currentProjectId) return;
      saveCurrentProjectSilently();
      const p = state.projects.find(x => x.id === state.currentProjectId);
      const area = $('project-export-area');
      area.classList.add('pdf-exporting');
      try { await html2pdf().set({ margin: [0.35, 0.35, 0.35, 0.35], filename: (p?.title || '项目') + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(area).save(); } catch (e) { showToast('导出 PDF 失败'); } finally { area.classList.remove('pdf-exporting'); }
    }
    function exportJSON() {
      if (!state.currentProjectId) return;
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const payload = { version: 1, exportedAt: new Date().toISOString(), project: { title: p.title, description: p.description, info: p.info, rows: collectRowData() } };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = sanitizeFileName(p.title || '项目') + '.json'; a.click(); URL.revokeObjectURL(a.href);
      showToast('JSON 已导出');
    }
    function exportHTML() {
      if (!state.currentProjectId) return;
      const p = state.projects.find(x => x.id === state.currentProjectId);
      if (!p) return;
      const rows = collectRowData();
      const rowsHTML = rows.map((row, i) => '<tr><td>' + (i+1) + '</td><td>' + escapeHTML(row.time) + '</td><td>' + escapeHTMLWithBreak(row.dept) + '</td><td>' + (row.img ? '<img src="' + row.img + '">' : '无') + '</td><td>' + escapeHTML(row.content) + '</td><td>' + escapeHTML(row.lens) + '</td><td>' + escapeHTML(row.movement) + '</td></tr>').join('');
      const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + escapeHTML(p.title) + '</title><style>body{margin:0;padding:24px;font-family:system-ui}table{width:100%;border-collapse:collapse}th,td{padding:8px 12px;border:1px solid #ddd}th{background:#f5f5f5}img{width:80px;height:60px;object-fit:cover}</style></head><body><h1>' + escapeHTML(p.title) + '</h1><p>' + escapeHTML(p.description || '') + '</p><table><thead><tr><th>#</th><th>时间</th><th>部门</th><th>参考图</th><th>拍摄内容</th><th>焦段</th><th>运镜</th></tr></thead><tbody>' + rowsHTML + '</tbody></table></body></html>';
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = sanitizeFileName(p.title || '项目') + '.html'; a.click(); URL.revokeObjectURL(a.href);
      showToast('HTML 已导出');
    }
    async function handleProjectJSONImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async ev => {
        try {
          const data = JSON.parse(ev.target.result);
          const payload = data?.project || data;
          if (!payload?.rows) { showToast('无效的项目文件'); return; }
          const newP = await createNewProject({ title: payload.title || '导入的项目', description: payload.description || '', password: payload.password || '', ...(payload.info || {}) });
          if (newP) { await saveProjectRows(newP.id, payload.rows.map(r => ({ time: r.time || '0:00 - 0:00', dept: r.dept || '', img: r.img || '', content: r.content || '', lens: r.lens || '', movement: r.movement || '' }))); await loadProjects(); showToast('项目已导入'); }
        } catch (err) { showToast('文件解析失败'); }
        e.target.value = '';
      };
      reader.readAsText(file);
    }
    function initSortable() { if (state.sortable) state.sortable.destroy(); state.sortable = new Sortable(tableBody, { handle: '.drag-handle', animation: 160, ghostClass: 'sortable-ghost', onEnd: () => { updateRowNumbers(); saveCurrentProjectSilently(); } }); }
    function toggleMenu(e, menuId) { e.stopPropagation(); const m = $(menuId); closeMenus(); if (!m.classList.contains('open')) m.classList.add('open'); }
    function closeMenus() { document.querySelectorAll('.action-menu.open').forEach(m => m.classList.remove('open')); }
    function setSync(status, text) { syncIndicator.className = 'sync-indicator ' + status; syncIndicator.querySelector('.sync-text').textContent = text; }
    function showToast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(state.toastTimer); state.toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200); }
    function formatDate(v) { if (!v) return '未记录'; const d = new Date(v); if (isNaN(d.getTime())) return String(v); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
    function escapeHTML(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escapeHTMLWithBreak(v) { return escapeHTML(v).replace(/\\n/g, '<br>'); }
    function sanitizeFileName(n) { return String(n).replace(/[\\\\/:*?"<>|]+/g, '_').trim() || '项目'; }
    function debounce(fn, delay) { let t = null; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); }; }
  </script>
</body>
</html>
